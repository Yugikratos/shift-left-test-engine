name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --prefer-binary

      - name: Initialize databases
        run: python -m utils.db_setup

      - name: Run pipeline demo
        run: python -m orchestrator.demo

      - name: Run tests
        run: python -m pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      # Removed external nexus login since we are mocking locally via port 5000
      # (Use act or manual local docker pushes matching this template for local tests)

      - name: Build container image (Push disabled on CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            localhost:5000/shift-left-test-engine:${{ github.sha }}
            localhost:5000/shift-left-test-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
